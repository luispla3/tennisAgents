<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - TennisAgents</title>
    <link rel="stylesheet" href="/static/css/style.css?v=12">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <!-- Logo/Brand -->
            <div class="navbar-brand">
                <a href="/" class="brand-link">
                    <img src="/img/logo.png" alt="TennisAgents logo" class="brand-logo" width="28" height="28">
                    <span class="brand-text">TennisAgents</span>
                </a>
            </div>

            <!-- Navigation Links -->
            <div class="navbar-links">
                <a href="/" class="nav-link">Inicio</a>
            </div>
        </div>
    </nav>

    <!-- Auth Container -->
    <main class="auth-main">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1 class="auth-title">Iniciar Sesión</h1>
                    <p class="auth-subtitle">Accede a tu cuenta de TennisAgents</p>
                </div>

                <form id="loginForm" class="auth-form">
                    <div class="auth-form-group">
                        <label for="email" class="auth-label">Correo Electrónico</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="auth-input" 
                            placeholder="tu@email.com"
                            required
                            autocomplete="email"
                        >
                    </div>

                    <div class="auth-form-group">
                        <label for="password" class="auth-label">Contraseña</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="auth-input" 
                            placeholder="••••••••"
                            required
                            autocomplete="current-password"
                        >
                    </div>

                    <div class="auth-form-group">
                        <label class="auth-checkbox-label">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span>Recordarme</span>
                        </label>
                    </div>

                    <div id="loginError" class="auth-error" style="display: none;"></div>

                    <button type="submit" class="auth-button auth-button-primary">
                        Iniciar Sesión
                    </button>
                </form>

                <div class="auth-divider">
                    <span>¿No tienes una cuenta?</span>
                </div>

                <a href="/register" class="auth-button auth-button-secondary">
                    Crear una cuenta
                </a>

                <div class="auth-footer">
                    <a href="/" class="auth-link">Volver al inicio</a>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/auth.js?v=1"></script>
    <script type="module" src="/static/js/firebase-auth.js?v=1"></script>
    <script type="module" src="/static/js/login.js?v=1"></script>
</body>
</html>
